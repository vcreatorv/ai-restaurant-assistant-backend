stages:
  - lint
  - test
  - build

variables:
  GOPATH: $CI_PROJECT_DIR/.cache/go
  GOMODCACHE: $CI_PROJECT_DIR/.cache/go/mod
  IMAGE_TAG: "${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"

cache: &go-cache
  key: go-mod
  paths:
    - .cache/go/mod
    - .cache/go-build

# ===== LINT =====

fmt-check:
  stage: lint
  image: golang:1.24
  cache: *go-cache
  before_script:
    - go install golang.org/x/tools/cmd/goimports@latest
  script:
    - test -z "$(gofmt -l .)"
    - test -z "$(goimports -l .)"

group-imports-check:
  stage: lint
  image: python:3.12
  script:
    - python scripts/group-imports.py --check $(find . -name '*.go' -not -path './api/generated/*')

golangci:
  stage: lint
  image: golangci/golangci-lint:latest
  cache: *go-cache
  script:
    - golangci-lint run --timeout 5m

openapi-drift:
  stage: lint
  image: golang:1.24
  cache: *go-cache
  before_script:
    - go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
  script:
    - oapi-codegen -config api/oapi-codegen.yaml api/openapi.yaml
    - git diff --exit-code api/generated/

# ===== TEST =====

test-unit:
  stage: test
  image: golang:1.24
  cache: *go-cache
  script:
    - go test ./... -race -short -coverprofile=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

test-integration:
  stage: test
  image: golang:1.24
  cache: *go-cache
  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_DB: app
        POSTGRES_USER: app
        POSTGRES_PASSWORD: app
    - name: redis:7-alpine
      alias: redis
      command: ["redis-server", "--requirepass", "redis"]
    - name: qdrant/qdrant:latest
      alias: qdrant
  variables:
    POSTGRES_DSN: "postgres://app:app@postgres:5432/app?sslmode=disable"
    REDIS_ADDR: "redis:6379"
    REDIS_PASSWORD: "redis"
    QDRANT_URL: "http://qdrant:6333"
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -L https://github.com/golang-migrate/migrate/releases/latest/download/migrate.linux-amd64.tar.gz | tar xz && mv migrate /usr/local/bin/
    - migrate -path migrations -database "$POSTGRES_DSN" up
  script:
    - go test ./... -tags=integration -race
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ===== BUILD =====

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - export BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    - echo "Building $CI_REGISTRY_IMAGE:$IMAGE_TAG"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build
        --build-arg VERSION=$CI_COMMIT_REF_SLUG
        --build-arg COMMIT=$CI_COMMIT_SHORT_SHA
        --build-arg BUILD_DATE=$BUILD_DATE
        -t $CI_REGISTRY_IMAGE:$IMAGE_TAG
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-latest
        .
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "master" ]; then
        docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG
        docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-latest
      else
        echo "MR build only — skipping push"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
