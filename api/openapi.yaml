openapi: 3.0.3

info:
  title: Restaurant AI Assistant API
  version: 0.1.0
  description: |
    REST API бэкенда цифрового ассистента рекомендаций блюд.
    Обслуживает SPA (гость / customer / админ).

    Аутентификация — через cookie `session_id` (HttpOnly, Secure, SameSite=Lax).
    Для мутирующих методов требуется заголовок `X-CSRF-Token`, сверяемый с
    сессионным токеном (получается из `GET /auth/session`).

servers:
  - url: /api/v1

tags:
  - name: auth
    description: Аутентификация и идентификация
  - name: profile
    description: Профиль текущего пользователя
  - name: menu
    description: Публичный каталог меню и справочники
  - name: chats
    description: Чаты и сообщения с ИИ-ассистентом
  - name: cart
    description: Корзина текущего пользователя
  - name: orders
    description: Заказы текущего пользователя
  - name: categories
    description: Публичный справочник категорий
  - name: admin-menu
    description: Управление меню (только role=admin)
  - name: admin-orders
    description: Управление заказами (только role=admin)
  - name: admin-analytics
    description: Аналитика (только role=admin)

security:
  - cookieAuth: []

paths:

  # ===== AUTH =====

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Регистрация (апгрейд текущей guest-строки)
      security: []
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: Успешная регистрация; CSRF ротирован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionInfo' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Вход в существующий аккаунт
      security: []
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Успешный вход; CSRF ротирован; корзина гостя смёрджена
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionInfo' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Выход; сессия удаляется
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204': { description: Успешный выход }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Текущая сессия — identity + CSRF-токен
      security: []
      responses:
        '200':
          description: Данные сессии (в т.ч. для гостя)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionInfo' }

  /auth/password:
    patch:
      operationId: changePassword
      tags: [auth]
      summary: Смена пароля
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '204': { description: Пароль изменён }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ===== PROFILE =====

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Профиль текущего пользователя
      responses:
        '200':
          description: Профиль
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Обновить профиль
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchProfileRequest' }
      responses:
        '200':
          description: Обновлённый профиль
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profile' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ===== MENU =====

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: Список доступных категорий
      security: []
      responses:
        '200':
          description: Категории
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CategoryList' }

  /menu:
    get:
      operationId: listDishes
      tags: [menu]
      summary: Каталог блюд с фильтрами
      security: []
      parameters:
        - { in: query, name: category_id,        schema: { type: integer, minimum: 1 } }
        - { in: query, name: available,          schema: { type: boolean }, description: "по умолчанию true; false вернёт всё включая стоп-лист" }
        - { in: query, name: q,                  schema: { type: string }, description: "поиск по названию" }
        - { in: query, name: exclude_allergens,  schema: { type: array, items: { type: string } }, style: form, explode: true }
        - { in: query, name: dietary,            schema: { type: array, items: { type: string } }, style: form, explode: true }
        - { in: query, name: tag_ids,            schema: { type: array, items: { type: integer } }, style: form, explode: true }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Список блюд
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DishList' }

  /menu/{id}:
    get:
      operationId: getDish
      tags: [menu]
      summary: Детали блюда
      security: []
      parameters:
        - $ref: '#/components/parameters/PathIntID'
      responses:
        '200':
          description: Блюдо
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Dish' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===== CHATS =====

  /chats:
    get:
      operationId: listChats
      tags: [chats]
      summary: Список чатов текущего пользователя
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Чаты
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createChat
      tags: [chats]
      summary: Создать новый чат
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateChatRequest' }
      responses:
        '201':
          description: Созданный чат
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Chat' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /chats/active:
    get:
      operationId: getActiveChat
      tags: [chats]
      summary: Активный чат пользователя (auto-create если нет / устарел)
      description: |
        Возвращает «текущий» чат пользователя.
        Если у пользователя нет чатов или последнее сообщение в самом свежем чате старше
        порога `chat.usecase.auto_new_chat_after`, создаётся новый чат и возвращается он.
      responses:
        '200':
          description: Активный чат
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Chat' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /chats/{id}:
    get:
      operationId: getChat
      tags: [chats]
      summary: Чат с сообщениями
      parameters:
        - $ref: '#/components/parameters/PathID'
        - { in: query, name: messages_limit,  schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { in: query, name: messages_before, schema: { type: string, format: uuid }, description: "cursor — id сообщения, до которого подгружаем" }
      responses:
        '200':
          description: Чат + сообщения (последние N)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatWithMessages' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteChat
      tags: [chats]
      summary: Удалить чат
      parameters:
        - $ref: '#/components/parameters/PathID'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204': { description: Удалено }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /chats/{id}/messages:
    post:
      operationId: sendMessage
      tags: [chats]
      summary: Отправить сообщение; ответ ассистента стримится через SSE
      description: |
        Ответ возвращается как `text/event-stream` с событиями:
          - `meta`  — `{ "message_id": "...", "recommended_dish_ids": ["..."] }`
          - `token` — `{ "delta": "..." }` (много раз)
          - `done`  — `{ "tokens_in": N, "tokens_out": N, "latency_ms": N }`
          - `error` — `{ "code": "...", "message": "..." }`
      parameters:
        - $ref: '#/components/parameters/PathID'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '200':
          description: SSE-поток событий
          content:
            text/event-stream:
              schema:
                type: string
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===== CART =====

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Текущая корзина
      responses:
        '200':
          description: Корзина с итогом и предупреждениями
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Очистить корзину
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204': { description: Очищено }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Добавить позицию
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddCartItemRequest' }
      responses:
        '201':
          description: Добавлено; возвращается позиция
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CartItem' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /cart/items/{dish_id}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Изменить позицию (quantity / note / sort_order)
      parameters:
        - $ref: '#/components/parameters/PathDishID'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchCartItemRequest' }
      responses:
        '200':
          description: Изменённая позиция
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CartItem' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Удалить позицию
      parameters:
        - $ref: '#/components/parameters/PathDishID'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204': { description: Удалено }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===== ORDERS =====

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Оформить заказ из корзины
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderRequest' }
      responses:
        '201':
          description: Созданный заказ; корзина очищена
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
    get:
      operationId: listOrders
      tags: [orders]
      summary: Список заказов текущего пользователя
      parameters:
        - { in: query, name: status, schema: { $ref: '#/components/schemas/OrderStatus' } }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Заказы
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Детали заказа
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Заказ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===== ADMIN: MENU =====

  /admin/categories:
    post:
      operationId: adminCreateCategory
      tags: [admin-menu]
      summary: Создать категорию
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCategoryRequest' }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/categories/{id}:
    patch:
      operationId: adminUpdateCategory
      tags: [admin-menu]
      summary: Обновить категорию
      parameters:
        - $ref: '#/components/parameters/PathIntID'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchCategoryRequest' }
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: adminDeleteCategory
      tags: [admin-menu]
      summary: Удалить категорию
      parameters:
        - $ref: '#/components/parameters/PathIntID'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204': { description: Удалено }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: В категории есть блюда — удалить нельзя
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/menu:
    post:
      operationId: adminCreateDish
      tags: [admin-menu]
      summary: Создать блюдо
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDishRequest' }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Dish' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/menu/{id}:
    patch:
      operationId: adminUpdateDish
      tags: [admin-menu]
      summary: Обновить блюдо
      parameters:
        - $ref: '#/components/parameters/PathIntID'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchDishRequest' }
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Dish' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: adminDeleteDish
      tags: [admin-menu]
      summary: Снять блюдо со стоп-листа (soft delete — is_available=false)
      parameters:
        - $ref: '#/components/parameters/PathIntID'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204': { description: Помечено недоступным }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/menu/{id}/image:
    post:
      operationId: adminUploadDishImage
      tags: [admin-menu]
      summary: Загрузить картинку блюда (multipart) в S3 и сохранить URL
      parameters:
        - $ref: '#/components/parameters/PathIntID'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Обновлённое блюдо с новым image_url
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Dish' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Файл слишком большой
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '415':
          description: Неподдерживаемый mime-type
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/tags:
    post:
      operationId: adminCreateTag
      tags: [admin-menu]
      summary: Создать тег
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTagRequest' }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tag' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
    get:
      operationId: adminListTags
      tags: [admin-menu]
      summary: Список тегов (для админ-формы блюда)
      responses:
        '200':
          description: Теги
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TagList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/tags/{id}:
    patch:
      operationId: adminUpdateTag
      tags: [admin-menu]
      summary: Обновить тег
      parameters:
        - $ref: '#/components/parameters/PathIntID'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchTagRequest' }
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tag' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: adminDeleteTag
      tags: [admin-menu]
      summary: Удалить тег (отвяжется от всех блюд)
      parameters:
        - $ref: '#/components/parameters/PathIntID'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204': { description: Удалено }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===== ADMIN: ORDERS =====

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin-orders]
      summary: Список всех заказов с фильтрами
      parameters:
        - { in: query, name: status,  schema: { $ref: '#/components/schemas/OrderStatus' } }
        - { in: query, name: from,    schema: { type: string, format: date-time } }
        - { in: query, name: to,      schema: { type: string, format: date-time } }
        - { in: query, name: user_id, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Заказы
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/orders/{id}:
    get:
      operationId: adminGetOrder
      tags: [admin-orders]
      summary: Детали заказа
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: Заказ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/orders/{id}/status:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [admin-orders]
      summary: Сменить статус заказа
      parameters:
        - $ref: '#/components/parameters/PathID'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchOrderStatusRequest' }
      responses:
        '200':
          description: Статус обновлён
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '400':
          description: Недопустимый переход статуса
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===== ADMIN: ANALYTICS =====
  # Перенесено в /admin/dashboard и /admin/analytics (см. ниже).

  # ===== ADMIN: AUDIT =====

  /admin/actions:
    get:
      operationId: adminListActions
      tags: [admin-audit]
      summary: Лента админских действий с фильтрами
      description: |
        Возвращает действия в обратном хронологическом порядке. Поддерживает фильтры по админу
        (id или 'me'), типу объекта и временному диапазону. Лента видна любому админу.
      parameters:
        - in: query
          name: admin_id
          description: "uuid админа или строка 'me'"
          schema: { type: string }
        - in: query
          name: target
          schema: { type: string, enum: [order, dish, category, tag, prompt] }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Лента действий
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminActionList' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/orders/{id}/actions:
    get:
      operationId: adminListOrderActions
      tags: [admin-audit]
      summary: История изменений конкретного заказа
      parameters:
        - $ref: '#/components/parameters/PathID'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: История по заказу
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminActionList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===== ADMIN: PROMPTS =====

  /admin/prompts:
    get:
      operationId: adminListPrompts
      tags: [admin-prompts]
      summary: Список промптов с активными версиями
      description: Возвращает список именованных промптов. Под каждым — активная версия и (если есть) черновик текущего админа.
      responses:
        '200':
          description: Список
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/prompts/details:
    get:
      operationId: adminGetPrompt
      tags: [admin-prompts]
      summary: Один промпт с историей версий и моим черновиком
      parameters:
        - $ref: '#/components/parameters/QueryPromptName'
      responses:
        '200':
          description: Промпт
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptDetails' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/prompts/draft:
    put:
      operationId: adminUpsertPromptDraft
      tags: [admin-prompts]
      summary: Создать или обновить мой черновик промпта
      parameters:
        - $ref: '#/components/parameters/QueryPromptName'
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpsertPromptDraftRequest' }
      responses:
        '200':
          description: Черновик сохранён
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptDraft' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: adminDeletePromptDraft
      tags: [admin-prompts]
      summary: Удалить мой черновик
      parameters:
        - $ref: '#/components/parameters/QueryPromptName'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204': { description: Удалено }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/prompts/publish:
    post:
      operationId: adminPublishPrompt
      tags: [admin-prompts]
      summary: Опубликовать мой черновик как новую активную версию
      parameters:
        - $ref: '#/components/parameters/QueryPromptName'
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Опубликована новая версия
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptVersion' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Нет черновика для публикации
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/prompts/rollback:
    post:
      operationId: adminRollbackPrompt
      tags: [admin-prompts]
      summary: Откатить промпт к указанной старой версии (создаёт новую запись с тем же content)
      parameters:
        - $ref: '#/components/parameters/QueryPromptName'
        - in: query
          name: version
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '200':
          description: Создана новая версия с содержимым старой
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptVersion' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------------
  # Подсказки чата (chat suggestions)
  # ---------------------------------------------------------------------------
  /chat/suggestions:
    get:
      operationId: listChatSuggestions
      tags: [chat]
      summary: Активные подсказки для чата (заполняются админом)
      description: |
        Возвращает только активные (is_active=true) подсказки, отсортированные по sort_order.
        Используется фронт-чатом для рендера чипов под полем ввода.
      responses:
        '200':
          description: Список подсказок
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatSuggestionList' }

  /chat/suggestions/{id}/click:
    post:
      operationId: trackChatSuggestionClick
      tags: [chat]
      summary: Зарегистрировать клик по подсказке (для аналитики)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204':
          description: Клик зарегистрирован
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/suggestions:
    get:
      operationId: adminListChatSuggestions
      tags: [admin-suggestions]
      summary: Список всех подсказок чата (включая неактивные)
      responses:
        '200':
          description: Список
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminChatSuggestionList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: adminCreateChatSuggestion
      tags: [admin-suggestions]
      summary: Создать подсказку
      parameters:
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateChatSuggestionRequest' }
      responses:
        '201':
          description: Создана
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminChatSuggestion' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/suggestions/{id}:
    patch:
      operationId: adminUpdateChatSuggestion
      tags: [admin-suggestions]
      summary: Обновить подсказку
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: '#/components/parameters/CSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchChatSuggestionRequest' }
      responses:
        '200':
          description: Обновлена
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminChatSuggestion' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: adminDeleteChatSuggestion
      tags: [admin-suggestions]
      summary: Удалить подсказку
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: '#/components/parameters/CSRFToken'
      responses:
        '204':
          description: Удалена
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------------
  # Dashboard и Analytics
  # ---------------------------------------------------------------------------
  /admin/dashboard:
    get:
      operationId: adminGetDashboard
      tags: [admin-analytics]
      summary: Операционные метрики по заказам за период (today | week | month)
      parameters:
        - in: query
          name: period
          required: true
          schema: { type: string, enum: [today, week, month] }
      responses:
        '200':
          description: Снимок метрик
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminDashboard' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/analytics:
    get:
      operationId: adminGetAnalytics
      tags: [admin-analytics]
      summary: Поведенческие метрики ассистента за период
      parameters:
        - in: query
          name: period
          required: true
          schema: { type: string, enum: [today, week, month] }
      responses:
        '200':
          description: Снимок метрик
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminAnalytics' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id

  parameters:
    PathID:
      in: path
      name: id
      required: true
      # pattern обязателен: gorillamux router (kin-openapi) не использует format: uuid для
      # сужения матчинга. Без pattern шаблон /chats/{id} сматчил бы /chats/active. Регекс
      # описывает RFC 4122 UUID и через расширение x-go-type-skip-optional-pointer не
      # портит сгенерированный Go-тип openapi_types.UUID.
      schema:
        type: string
        format: uuid
        pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
    PathIntID:
      in: path
      name: id
      required: true
      schema: { type: integer, minimum: 1 }
    PathDishID:
      in: path
      name: dish_id
      required: true
      schema: { type: integer, minimum: 1 }
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
    Offset:
      in: query
      name: offset
      schema: { type: integer, minimum: 0, default: 0 }
    CSRFToken:
      in: header
      name: X-CSRF-Token
      required: true
      schema: { type: string }
    QueryPromptName:
      in: query
      name: name
      required: true
      description: |
        Имя промпта. Список валидных имён задан в коде (prompts.SupportedNames).
        Сейчас: system, classification, refusal. Расширение — без правки OpenAPI,
        проверка идёт в usecase через prompts.IsSupported.
      schema:
        type: string
        minLength: 1

  responses:
    BadRequest:
      description: Ошибка валидации
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Не аутентифицирован или недействительная сессия
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Конфликт состояния
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:

    # ----- common -----

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:    { type: string, example: "validation_failed" }
            message: { type: string, example: "Please check the submitted data" }
            details:
              type: object
              properties:
                trace_id: { type: string }
                fields:
                  type: array
                  items: { $ref: '#/components/schemas/FieldViolation' }
              additionalProperties: true

    FieldViolation:
      type: object
      required: [name, reason]
      properties:
        name:   { type: string }
        reason:
          type: string
          enum: [required, invalid_format, too_short, too_long, out_of_range, unsupported_value, not_unique]
        min: { oneOf: [ { type: integer }, { type: number }, { type: string } ] }
        max: { oneOf: [ { type: integer }, { type: number }, { type: string } ] }

    PaginationMeta:
      type: object
      required: [total, limit, offset]
      properties:
        total:  { type: integer, minimum: 0 }
        limit:  { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    # ----- enums -----

    Role:
      type: string
      enum: [guest, customer, admin]

    OrderStatus:
      type: string
      enum: [accepted, cooking, ready, in_delivery, closed, cancelled]

    FulfillmentType:
      type: string
      enum: [delivery, pickup, dine_in]

    PaymentMethod:
      type: string
      enum: [on_delivery, online_stub]

    MessageRole:
      type: string
      enum: [user, assistant]

    # ----- auth / profile -----

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 100 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string }
        new_password:     { type: string, minLength: 8, maxLength: 100 }

    SessionInfo:
      type: object
      required: [is_guest, csrf]
      properties:
        user_id:
          type: string
          format: uuid
          nullable: true
          description: "null если ещё не было стейтфул-действий — PG-строки пользователя пока нет"
        role:
          type: string
          enum: [guest, customer, admin]
          nullable: true
        is_guest: { type: boolean }
        csrf:     { type: string }

    Profile:
      type: object
      required: [email, allergens, dietary]
      properties:
        email:      { type: string, format: email }
        first_name: { type: string, nullable: true }
        last_name:  { type: string, nullable: true }
        phone:      { type: string, nullable: true, description: "E.164" }
        allergens:  { type: array, items: { type: string }, description: "allergen codes" }
        dietary:    { type: array, items: { type: string }, description: "dietary codes" }

    PatchProfileRequest:
      type: object
      properties:
        first_name: { type: string, nullable: true }
        last_name:  { type: string, nullable: true }
        phone:      { type: string, nullable: true }
        allergens:  { type: array, items: { type: string } }
        dietary:    { type: array, items: { type: string } }

    # ----- menu -----

    Cuisine:
      type: string
      enum: [russian, italian, japanese, french, asian, european, american]

    Category:
      type: object
      required: [id, name, sort_order, is_available, role]
      properties:
        id:           { type: integer, minimum: 1 }
        name:         { type: string }
        sort_order:   { type: integer }
        is_available: { type: boolean }
        role:
          $ref: '#/components/schemas/CategoryRole'

    CategoryRole:
      type: string
      enum: [none, main, companion]
      description: |
        Роль категории в RAG-пайплайне рекомендаций:
        * `none`      — не участвует в diversify/companion-логике;
        * `main`      — основная категория, для диверсификации main-выдачи;
        * `companion` — сопровождение (соус/гарнир/десерт/напиток), по 1 блюду на запрос.

    CategoryList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Category' } }

    Tag:
      type: object
      required: [id, name, slug, color]
      properties:
        id:    { type: integer, minimum: 1 }
        name:  { type: string }
        slug:  { type: string }
        color: { type: string, description: "hex, например #E53935" }

    TagList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Tag' } }

    Dish:
      type: object
      required:
        [id, category_id, name, description, composition, image_url,
         price_minor, currency, cuisine, allergens, dietary, tags, is_available]
      properties:
        id:               { type: integer, minimum: 1 }
        category_id:      { type: integer, minimum: 1 }
        name:             { type: string }
        description:      { type: string }
        composition:      { type: string }
        image_url:        { type: string }
        price_minor:      { type: integer, minimum: 1, maximum: 100000000 }
        currency:         { type: string, example: "RUB" }
        calories_kcal:    { type: integer, nullable: true, minimum: 0 }
        protein_g:        { type: number, format: float, nullable: true, minimum: 0 }
        fat_g:            { type: number, format: float, nullable: true, minimum: 0 }
        carbs_g:          { type: number, format: float, nullable: true, minimum: 0 }
        portion_weight_g: { type: integer, nullable: true, minimum: 1 }
        cuisine:          { $ref: '#/components/schemas/Cuisine' }
        allergens:        { type: array, items: { type: string } }
        dietary:          { type: array, items: { type: string } }
        tags:             { type: array, items: { $ref: '#/components/schemas/Tag' } }
        is_available:     { type: boolean }

    DishList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:  { type: array, items: { $ref: '#/components/schemas/Dish' } }
        total:  { type: integer, minimum: 0 }
        limit:  { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    # ----- cart -----

    CartItem:
      type: object
      required: [dish_id, name, price_minor, quantity, line_total_minor, sort_order, available]
      properties:
        dish_id:          { type: integer, minimum: 1 }
        name:             { type: string }
        price_minor:      { type: integer, minimum: 0, description: "Цена единицы в минимальных единицах валюты (копейки для RUB)" }
        quantity:         { type: integer, minimum: 1 }
        note:             { type: string, nullable: true }
        sort_order:       { type: integer }
        added_at:         { type: string, format: date-time }
        available:        { type: boolean, description: "Доступно к заказу: блюдо ещё в меню и не на стоп-листе" }
        line_total_minor: { type: integer, minimum: 0, description: "price_minor * quantity" }

    CartWarning:
      type: object
      required: [code, dish_id]
      properties:
        code:    { type: string, example: "dish_unavailable", description: "Тип предупреждения: dish_unavailable | dish_removed" }
        dish_id: { type: integer, minimum: 1 }

    Cart:
      type: object
      required: [items, total_minor, currency, warnings]
      properties:
        items:       { type: array, items: { $ref: '#/components/schemas/CartItem' } }
        total_minor: { type: integer, minimum: 0, description: "Сумма line_total_minor по доступным позициям" }
        currency:    { type: string, example: "RUB" }
        warnings:    { type: array, items: { $ref: '#/components/schemas/CartWarning' } }

    AddCartItemRequest:
      type: object
      required: [dish_id, quantity]
      properties:
        dish_id:  { type: integer, minimum: 1 }
        quantity: { type: integer, minimum: 1 }
        note:     { type: string, nullable: true }
        source:
          type: string
          enum: [chat, menu, cart, other]
          description: |
            Источник добавления — используется только для аналитики (cart_additions).
            Не влияет на корзину. Если не передан — считается "other".
            "chat" — добавление из карточки блюда в ответе ассистента;
            "menu" — со страницы публичного меню;
            "cart" — изменение в самой корзине;
            "other" — fallback для старых клиентов.
        message_id:
          type: string
          format: uuid
          description: |
            id assistant-сообщения, из которого взято блюдо (опционально, только при source="chat").
            Позволяет связать клик с конкретной рекомендацией для аналитики.

    PatchCartItemRequest:
      type: object
      properties:
        quantity:   { type: integer, minimum: 1 }
        note:       { type: string, nullable: true }
        sort_order: { type: integer }

    # ----- orders -----

    OrderItem:
      type: object
      required: [dish_id, dish_name, dish_price_minor, quantity, line_total_minor, sort_order]
      properties:
        dish_id:          { type: integer, minimum: 1, nullable: true, description: "null если блюдо удалено из меню после оформления" }
        dish_name:        { type: string, description: "Snapshot названия на момент заказа" }
        dish_price_minor: { type: integer, minimum: 0, description: "Snapshot цены за единицу в копейках" }
        quantity:         { type: integer, minimum: 1 }
        line_total_minor: { type: integer, minimum: 0 }
        sort_order:       { type: integer }

    Order:
      type: object
      required:
        [id, user_id, status, fulfillment_type, total_minor, currency, payment_method,
         customer_first_name, customer_last_name, customer_phone,
         items, created_at, updated_at]
      properties:
        id:                 { type: string, format: uuid }
        user_id:            { type: string, format: uuid }
        status:             { $ref: '#/components/schemas/OrderStatus' }
        fulfillment_type:   { $ref: '#/components/schemas/FulfillmentType' }
        total_minor:        { type: integer, minimum: 0 }
        currency:           { type: string, example: "RUB" }
        payment_method:     { $ref: '#/components/schemas/PaymentMethod' }
        customer_first_name: { type: string }
        customer_last_name: { type: string }
        customer_phone:     { type: string }
        customer_email:     { type: string, format: email, nullable: true }
        delivery_address:   { type: string, nullable: true }
        delivery_notes:     { type: string, nullable: true }
        notes:              { type: string, nullable: true }
        items:              { type: array, items: { $ref: '#/components/schemas/OrderItem' } }
        created_at:         { type: string, format: date-time }
        updated_at:         { type: string, format: date-time }

    OrderList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:  { type: array, items: { $ref: '#/components/schemas/Order' } }
        total:  { type: integer, minimum: 0 }
        limit:  { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    CreateOrderRequest:
      type: object
      required: [fulfillment_type, payment_method]
      properties:
        fulfillment_type: { $ref: '#/components/schemas/FulfillmentType' }
        delivery_address: { type: string, nullable: true }
        delivery_notes:   { type: string, nullable: true }
        payment_method:   { $ref: '#/components/schemas/PaymentMethod' }
        notes:            { type: string, nullable: true }

    # ----- chats -----

    Chat:
      type: object
      required: [id, user_id, created_at, last_message_at]
      properties:
        id:              { type: string, format: uuid }
        user_id:         { type: string, format: uuid }
        title:           { type: string, nullable: true }
        created_at:      { type: string, format: date-time }
        last_message_at: { type: string, format: date-time }

    ChatList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:  { type: array, items: { $ref: '#/components/schemas/Chat' } }
        total:  { type: integer }
        limit:  { type: integer }
        offset: { type: integer }

    Message:
      type: object
      required: [id, chat_id, role, content, created_at]
      properties:
        id:                   { type: string, format: uuid }
        chat_id:              { type: string, format: uuid }
        role:                 { $ref: '#/components/schemas/MessageRole' }
        content:              { type: string }
        recommended_dish_ids: { type: array, items: { type: integer, minimum: 1 } }
        created_at:           { type: string, format: date-time }

    ChatWithMessages:
      type: object
      required: [chat, messages]
      properties:
        chat:     { $ref: '#/components/schemas/Chat' }
        messages:
          type: array
          description: "Сортировка — по created_at ASC (старые → новые)"
          items: { $ref: '#/components/schemas/Message' }
        has_more: { type: boolean, description: "Есть ли ещё более старые сообщения" }

    CreateChatRequest:
      type: object
      properties:
        title: { type: string, nullable: true }

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 4000 }

    # ----- admin menu -----

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:         { type: string, minLength: 1, maxLength: 100 }
        sort_order:   { type: integer, default: 0 }
        is_available: { type: boolean, default: true }
        role:
          $ref: '#/components/schemas/CategoryRole'

    PatchCategoryRequest:
      type: object
      properties:
        name:         { type: string, minLength: 1, maxLength: 100 }
        sort_order:   { type: integer }
        is_available: { type: boolean }
        role:
          $ref: '#/components/schemas/CategoryRole'

    CreateTagRequest:
      type: object
      required: [name, slug]
      properties:
        name:  { type: string, minLength: 1, maxLength: 50 }
        slug:  { type: string, minLength: 1, maxLength: 50, pattern: "^[a-z0-9_-]+$" }
        color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }

    PatchTagRequest:
      type: object
      properties:
        name:  { type: string, minLength: 1, maxLength: 50 }
        slug:  { type: string, minLength: 1, maxLength: 50, pattern: "^[a-z0-9_-]+$" }
        color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }

    CreateDishRequest:
      type: object
      required: [name, category_id, cuisine, price_minor]
      properties:
        name:             { type: string, minLength: 1, maxLength: 200 }
        description:      { type: string, maxLength: 2000 }
        composition:      { type: string, maxLength: 1000 }
        image_url:        { type: string, maxLength: 500 }
        price_minor:      { type: integer, minimum: 1, maximum: 100000000 }
        currency:         { type: string, default: "RUB" }
        calories_kcal:    { type: integer, nullable: true, minimum: 0 }
        protein_g:        { type: number, format: float, nullable: true, minimum: 0 }
        fat_g:            { type: number, format: float, nullable: true, minimum: 0 }
        carbs_g:          { type: number, format: float, nullable: true, minimum: 0 }
        portion_weight_g: { type: integer, nullable: true, minimum: 1 }
        cuisine:          { $ref: '#/components/schemas/Cuisine' }
        category_id:      { type: integer, minimum: 1 }
        allergens:        { type: array, items: { type: string } }
        dietary:          { type: array, items: { type: string } }
        tag_ids:          { type: array, items: { type: integer, minimum: 1 } }
        is_available:     { type: boolean, default: true }

    PatchDishRequest:
      type: object
      properties:
        name:             { type: string, minLength: 1, maxLength: 200 }
        description:      { type: string, maxLength: 2000 }
        composition:      { type: string, maxLength: 1000 }
        image_url:        { type: string, maxLength: 500 }
        price_minor:      { type: integer, minimum: 1, maximum: 100000000 }
        currency:         { type: string }
        calories_kcal:    { type: integer, nullable: true, minimum: 0 }
        protein_g:        { type: number, format: float, nullable: true, minimum: 0 }
        fat_g:            { type: number, format: float, nullable: true, minimum: 0 }
        carbs_g:          { type: number, format: float, nullable: true, minimum: 0 }
        portion_weight_g: { type: integer, nullable: true, minimum: 1 }
        cuisine:          { $ref: '#/components/schemas/Cuisine' }
        category_id:      { type: integer, minimum: 1 }
        allergens:        { type: array, items: { type: string } }
        dietary:          { type: array, items: { type: string } }
        tag_ids:          { type: array, items: { type: integer, minimum: 1 } }
        is_available:     { type: boolean }

    # ----- admin orders -----

    PatchOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: '#/components/schemas/OrderStatus' }
        note:   { type: string, nullable: true }

    # ----- prompts -----

    PromptName:
      type: string
      description: "Имя промпта. Валидные значения определены в коде (prompts.SupportedNames)."

    PromptVersion:
      type: object
      required: [version, content, published_at, published_by]
      properties:
        version:      { type: integer, minimum: 1 }
        content:      { type: string, minLength: 50, maxLength: 8000 }
        published_at: { type: string, format: date-time }
        published_by: { $ref: '#/components/schemas/PromptAuthor' }

    PromptAuthor:
      type: object
      required: [id, display_name, email]
      properties:
        id:           { type: string, format: uuid }
        display_name: { type: string }
        email:        { type: string, format: email }

    PromptDraft:
      type: object
      required: [name, content, updated_at]
      properties:
        name:       { $ref: '#/components/schemas/PromptName' }
        content:    { type: string, minLength: 50, maxLength: 8000 }
        updated_at: { type: string, format: date-time }

    Prompt:
      type: object
      required: [name, current]
      properties:
        name:    { $ref: '#/components/schemas/PromptName' }
        current: { $ref: '#/components/schemas/PromptVersion' }
        draft:
          allOf: [{ $ref: '#/components/schemas/PromptDraft' }]
          nullable: true

    PromptList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Prompt' } }

    PromptDetails:
      type: object
      required: [name, current, history]
      properties:
        name:    { $ref: '#/components/schemas/PromptName' }
        current: { $ref: '#/components/schemas/PromptVersion' }
        draft:
          allOf: [{ $ref: '#/components/schemas/PromptDraft' }]
          nullable: true
        history:
          type: array
          description: "Все версии (включая active) в порядке убывания version"
          items: { $ref: '#/components/schemas/PromptVersion' }

    UpsertPromptDraftRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 50, maxLength: 8000 }

    # ----- audit -----

    AdminActionTarget:
      type: string
      enum: [order, dish, category, tag, prompt]

    AdminActionVerb:
      type: string
      enum: [create, update, delete, status_change, publish, rollback]

    AdminActionAuthor:
      type: object
      required: [display_name, has_namesake]
      properties:
        # nullable: если админ удалён, в логе мы оставляем запись, но автор анонимен
        id:
          type: string
          format: uuid
          nullable: true
        display_name: { type: string }
        email:
          type: string
          format: email
          nullable: true
        has_namesake:
          type: boolean
          description: "true, если в системе есть другой админ с таким же ФИО — фронт показывает email рядом"

    AdminActionChange:
      type: object
      required: [field]
      properties:
        field: { type: string }
        from:  { type: string, nullable: true }
        to:    { type: string, nullable: true }

    AdminAction:
      type: object
      required: [id, admin, target, target_id, target_label, verb, changes, created_at]
      properties:
        id:           { type: string, description: "стабильный id (bigserial→string)" }
        admin:        { $ref: '#/components/schemas/AdminActionAuthor' }
        target:       { $ref: '#/components/schemas/AdminActionTarget' }
        target_id:    { type: string }
        target_label: { type: string }
        verb:         { $ref: '#/components/schemas/AdminActionVerb' }
        changes:
          type: array
          items: { $ref: '#/components/schemas/AdminActionChange' }
        created_at:   { type: string, format: date-time }

    AdminActionList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:  { type: array, items: { $ref: '#/components/schemas/AdminAction' } }
        total:  { type: integer }
        limit:  { type: integer }
        offset: { type: integer }

    # ----- chat suggestions -----

    ChatSuggestion:
      type: object
      required: [id, text]
      properties:
        id:   { type: integer, minimum: 1 }
        text: { type: string }

    ChatSuggestionList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ChatSuggestion' } }

    AdminChatSuggestion:
      type: object
      required: [id, text, sort_order, is_active, clicks_count]
      properties:
        id:           { type: integer, minimum: 1 }
        text:         { type: string }
        sort_order:   { type: integer }
        is_active:    { type: boolean }
        clicks_count: { type: integer, format: int64, description: "Сколько раз гости кликали по подсказке" }

    AdminChatSuggestionList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AdminChatSuggestion' } }

    CreateChatSuggestionRequest:
      type: object
      required: [text]
      properties:
        text:       { type: string, minLength: 1, maxLength: 80 }
        sort_order: { type: integer, default: 0 }
        is_active:  { type: boolean, default: true }

    PatchChatSuggestionRequest:
      type: object
      properties:
        text:       { type: string, minLength: 1, maxLength: 80 }
        sort_order: { type: integer }
        is_active:  { type: boolean }

    # ----- dashboard / analytics -----

    OrdersByStatusEntry:
      type: object
      required: [status, count]
      properties:
        status: { $ref: '#/components/schemas/OrderStatus' }
        count:  { type: integer }

    TopDishEntry:
      type: object
      required: [dish_id, dish_name, value]
      properties:
        dish_id:   { type: integer, minimum: 1 }
        dish_name: { type: string }
        value:     { type: integer, description: "значение метрики (заказано / рекомендовано)" }

    AdminDashboard:
      type: object
      required:
        - period
        - orders
        - revenue_minor
        - average_check_minor
        - orders_by_status
        - top_dishes
        - cart_additions_total
        - cart_additions_from_chat
        - cart_additions_from_menu
      properties:
        period:              { type: string, enum: [today, week, month] }
        orders:              { type: integer, description: "количество заказов за период" }
        revenue_minor:       { type: integer, description: "выручка в копейках" }
        average_check_minor: { type: integer, description: "средний чек в копейках" }
        orders_by_status:
          type: array
          items: { $ref: '#/components/schemas/OrdersByStatusEntry' }
        top_dishes:
          type: array
          items: { $ref: '#/components/schemas/TopDishEntry' }
        cart_additions_total:     { type: integer, description: "всего «+» в корзину за период (все источники)" }
        cart_additions_from_chat: { type: integer, description: "из них — добавлений из карточки в ответе ассистента (source='chat')" }
        cart_additions_from_menu: { type: integer, description: "из них — добавлений со страницы /menu (source='menu')" }

    AdminAnalytics:
      type: object
      required:
        - period
        - assistant_messages
        - avg_ordered_per_message
        - avg_added_to_cart_per_message
        - top_recommended_dishes
      properties:
        period:                       { type: string, enum: [today, week, month] }
        assistant_messages:           { type: integer, description: "число assistant-ответов с рекомендациями" }
        avg_ordered_per_message:      { type: number, format: float, description: "среднее количество рекомендованных блюд, реально заказанных гостем" }
        avg_added_to_cart_per_message: { type: number, format: float, description: "среднее количество рекомендованных блюд, добавленных в корзину из чата" }
        top_recommended_dishes:
          type: array
          items: { $ref: '#/components/schemas/TopDishEntry' }
