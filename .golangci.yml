version: "2"

run:
  tests: true
  timeout: 10m

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - dupl
    - errcheck
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    dupl:
      threshold: 300

    errcheck:
      check-blank: false

    gocyclo:
      min-complexity: 15

    govet:
      enable:
        - shadow

    lll:
      line-length: 120

    nakedret:
      max-func-lines: 30

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

    unparam:
      check-exported: true

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - lll
        source: '^//go:generate '
      - linters:
          - lll
        path: cmd/app/app/unimplemented\.go
      # systemPrompt — длинные русские строки правил для LLM, переносы ломают читаемость
      - linters:
          - lll
        path: internal/chat/usecase/prompt\.go
      - linters:
          - gocyclo
        path: cmd/app/app/app\.go
        text: 'responseErrorHandler'
      - linters:
          - gocyclo
        path: cmd/app/app/config\.go
        text: 'LoadConfig'
      - linters:
          - gocyclo
        path: internal/menu/usecase/menu\.go
        text: 'applyDishPatch'
      # RAG-pipeline-функции: множество стадий по природе (embed → search → rerank → load → companions),
      # дробление на под-функции ради метрики усложняет чтение, не упрощает. Поднят явный threshold.
      - linters:
          - gocyclo
        path: internal/chat/usecase/chat\.go
        text: 'SendMessage|runRAG|runMainDiversification'
      # SSE-парсер: один цикл с разбором SSE-кадров; разделение усложнит, не упростит
      - linters:
          - gocyclo
        path: internal/pkg/llm/llm\.go
        text: 'consumeStream'
      - linters:
          - gosec
        path: cmd/app/app/config\.go
        text: 'G304|G703'

    paths:
      - bin$
      - \.git$
      - mocks
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    tab:
      path: stdout
      colors: true
