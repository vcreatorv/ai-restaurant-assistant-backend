name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"

jobs:

  # ===== LINT =====

  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::files not gofmt'd:"
            echo "$out"
            exit 1
          fi
      - name: goimports
        run: |
          out=$(goimports -l .)
          if [ -n "$out" ]; then
            echo "::error::files not goimports'd:"
            echo "$out"
            exit 1
          fi

  group-imports-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: regroup imports
        run: |
          set -e
          find . -name '*.go' \
            -not -path './cmd/app/app/v1/*' \
            -not -path './internal/models/api/api.gen.go' \
            -not -path './bin/*' \
            -print0 | xargs -0 -n1 python scripts/group-imports.py
      - name: detect drift
        run: git diff --exit-code

  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout 5m

  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
      - name: regenerate
        run: |
          oapi-codegen -config api/types.cfg.yaml  api/openapi.yaml
          oapi-codegen -config api/server.cfg.yaml api/openapi.yaml
      - name: detect drift
        run: git diff --exit-code internal/models/api/api.gen.go cmd/app/app/v1/server.gen.go

  # ===== TEST =====

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go test ./... -race -short -coverprofile=coverage.out
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
    env:
      POSTGRES_DSN: "postgres://app:app@localhost:5432/app?sslmode=disable"
      REDIS_ADDR: "localhost:6379"
      QDRANT_URL: "http://localhost:6333"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/latest/download/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/
      - name: apply migrations
        run: migrate -path migrations -database "$POSTGRES_DSN" up
      - name: integration tests
        run: go test ./... -tags=integration -race

  # ===== BUILD =====

  build-image:
    runs-on: ubuntu-latest
    needs: [fmt-check, group-imports-check, golangci, openapi-drift, test-unit]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: meta
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: login to ghcr
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.commit }}
            ${{ steps.meta.outputs.image }}:main-latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
